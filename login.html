<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Expressive English Academy Finances</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" class="login-body">
  <div class="login-bg"></div>

  <main class="login-wrapper">
    <section class="login-brand-card">
      <span class="eyebrow">Plataforma privada</span>
      <h1>Expressive English Academy Finances</h1>
      <p>
        Embrace the Extraordinary
      </p>

      <div class="login-feature-list">
        <div class="login-feature">
          <span class="feature-dot"></span>
          Dashboard financiero premium
        </div>
        <div class="login-feature">
          <span class="feature-dot"></span>
          Control de ingresos, gastos y caja
        </div>
        <div class="login-feature">
          <span class="feature-dot"></span>
          Reportes visuales con acceso seguro
        </div>
      </div>
    </section>

    <section class="login-panel glass-card">
      <div class="panel-header compact">
        <div>
          <span class="eyebrow">Acceso seguro</span>
          <h2>Iniciar sesi&oacute;n</h2>
        </div>
      </div>

      <form id="loginForm" class="form-grid single-column">
        <label class="field">
          <span>Correo electr&oacute;nico</span>
          <input type="email" name="email" placeholder="admin@expressiveacademy.com" required />
        </label>

        <label class="field">
          <span>Contrase&ntilde;a</span>
          <input type="password" name="password" placeholder="**********" required />
        </label>

        <button type="submit" class="btn btn-primary btn-lg">Ingresar a la plataforma</button>
      </form>

      <p class="muted-note">
        Acceso solo para usuarios autorizados por la academia.
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
