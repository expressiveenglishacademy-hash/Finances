<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Matrícula</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="glass-card" style="max-width:600px;margin:auto;margin-top:40px;">
  <h2>Matrícula</h2>

  <form id="form">

    <input type="text" id="nombre" placeholder="Nombre del estudiante" required><br><br>

    <input type="text" id="nivel" placeholder="Nivel" required><br><br>

    <input type="text" id="docente" placeholder="Docente" required><br><br>

    <input type="number" id="mensualidad" placeholder="Mensualidad $" required><br><br>

    <input type="number" id="material" placeholder="Material C$" required><br><br>

    <label>
      <input type="checkbox" id="menor"> Es menor de edad
    </label><br><br>

    <div id="extra" style="display:none;">
      <input type="text" id="responsable" placeholder="Nombre del padre/madre"><br><br>
      <input type="text" id="telefono" placeholder="Teléfono"><br><br>
    </div>

    <button type="submit">Generar comprobante</button>

  </form>
</div>

<!-- COMPROBANTE -->
<div id="recibo" class="glass-card" style="max-width:600px;margin:auto;margin-top:20px;display:none;"></div>

<script>
const tasa = 36.5;

const form = document.getElementById("form");
const recibo = document.getElementById("recibo");
const menor = document.getElementById("menor");
const extra = document.getElementById("extra");

menor.addEventListener("change", () => {
  extra.style.display = menor.checked ? "block" : "none";
});

form.addEventListener("submit", function(e){
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const nivel = document.getElementById("nivel").value;
  const docente = document.getElementById("docente").value;
  const mensualidad = parseFloat(document.getElementById("mensualidad").value);
  const material = parseFloat(document.getElementById("material").value);

  const mensualidadNIO = (mensualidad * tasa).toFixed(2);

  const responsable = document.getElementById("responsable").value;
  const telefono = document.getElementById("telefono").value;

  recibo.style.display = "block";

  recibo.innerHTML = `
    <h3>Comprobante de Matrícula</h3>
    <hr>

    <p><b>Nombre:</b> ${nombre}</p>
    <p><b>Nivel:</b> ${nivel}</p>
    <p><b>Docente:</b> ${docente}</p>

    <p><b>Mensualidad:</b> $${mensualidad} / C$ ${mensualidadNIO}</p>
    <p><b>Material:</b> C$ ${material}</p>

    ${menor.checked ? `
      <hr>
      <p><b>Responsable:</b> ${responsable}</p>
      <p><b>Teléfono:</b> ${telefono}</p>
    ` : ""}
  `;
});
</script>

</body>
</html>
