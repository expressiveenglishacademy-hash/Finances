<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matrícula | Expressive English Academy</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .form-container {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
    }

    .field {
      display: block;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-primary { background: #22c55e; color: white; }
    .btn-secondary { background: #3b82f6; color: white; }

    .preview {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📘 Matrícula de Estudiantes</h1>

<div class="form-container">
  <form id="matriculaForm">

    <label class="field">
      <span>Nombre del estudiante</span>
      <input type="text" id="nombre" required />
    </label>

    <label class="field">
      <span>Nivel</span>
      <input type="text" id="nivel" required />
    </label>

    <label class="field">
      <span>Docente asignado</span>
      <input type="text" id="docente" required />
    </label>

    <label class="field">
      <span>Costo mensualidad ($)</span>
      <input type="number" id="mensualidad" required />
    </label>

    <label class="field">
      <span>Costo de material ($)</span>
      <input type="number" id="material" required />
    </label>

    <button type="submit" class="btn-primary">Generar comprobante</button>
  </form>

  <div class="preview" id="preview" style="display:none;"></div>

  <button id="downloadPDF" class="btn-secondary" style="display:none;">
    Descargar PDF
  </button>
</div>

<script>
  const form = document.getElementById("matriculaForm");
  const preview = document.getElementById("preview");
  const downloadBtn = document.getElementById("downloadPDF");

  let data = {};

  // 🔥 Tasa de cambio (puedes ajustarla)
  const tasa = 36.5;

  form.addEventListener("submit", function(e){
    e.preventDefault();

    const mensualidadUSD = parseFloat(document.getElementById("mensualidad").value);
    const materialUSD = parseFloat(document.getElementById("material").value);

    data = {
      nombre: document.getElementById("nombre").value,
      nivel: document.getElementById("nivel").value,
      docente: document.getElementById("docente").value,
      mensualidadUSD,
      materialUSD,
      mensualidadNIO: (mensualidadUSD * tasa).toFixed(2),
      materialNIO: (materialUSD * tasa).toFixed(2),
      fecha: new Date().toLocaleDateString()
    };

    preview.style.display = "block";
    downloadBtn.style.display = "block";

    preview.innerHTML = `
      <h3>📄 Comprobante de Matrícula</h3>
      <p><strong>Nombre:</strong> ${data.nombre}</p>
      <p><strong>Nivel:</strong> ${data.nivel}</p>
      <p><strong>Docente:</strong> ${data.docente}</p>

      <p><strong>Mensualidad:</strong> $${data.mensualidadUSD} 
      (C$ ${data.mensualidadNIO})</p>

      <p><strong>Material:</strong> $${data.materialUSD} 
      (C$ ${data.materialNIO})</p>

      <p><strong>Fecha:</strong> ${data.fecha}</p>
    `;
  });

  downloadBtn.addEventListener("click", function(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(16);
    doc.text("Expressive English Academy", 20, 20);

    doc.setFontSize(12);
    doc.text("Comprobante de Matrícula", 20, 30);

    doc.text(`Nombre: ${data.nombre}`, 20, 50);
    doc.text(`Nivel: ${data.nivel}`, 20, 60);
    doc.text(`Docente: ${data.docente}`, 20, 70);

    doc.text(`Mensualidad: $${data.mensualidadUSD} (C$ ${data.mensualidadNIO})`, 20, 80);
    doc.text(`Material: $${data.materialUSD} (C$ ${data.materialNIO})`, 20, 90);

    doc.text(`Fecha: ${data.fecha}`, 20, 100);

    doc.save(`Matricula_${data.nombre}.pdf`);
  });
</script>

</body>
</html>
